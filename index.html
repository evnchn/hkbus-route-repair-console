<!doctype html><html lang=en><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Route-geometry repair console · hkbus</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
<meta name="color-scheme" content="dark">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1013; --surf:#151a20; --surf2:#1b222b; --line:#252d38; --line2:#323c49;
  --tx:#e7eaef; --mut:#8b95a3; --dim:#5c6675;
  --csdi:#ff453a; --chord:#ff9f0a; --deloop:#c07cf0; --pfaedle:#32d74b; --stop:#ffd60a;
  --kmb:#d81e28; --ctb:#f2b70a;
  --good:#32d74b; --warn:#ff9f0a; --bad:#ff453a;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--tx);
  font:14px/1.5 Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
.osw{font-family:Oswald,system-ui,sans-serif}
b,strong{font-weight:600}
/* shell */
#app{display:grid;grid-template-columns:200px 1fr 344px;grid-template-rows:auto 1fr;height:100vh}
header{grid-column:1/-1;display:flex;align-items:center;gap:18px;padding:11px 18px;
  background:linear-gradient(180deg,#11161c,#0d1013);border-bottom:1px solid var(--line)}
header h1{font-family:Oswald;font-weight:600;font-size:19px;letter-spacing:.3px;margin:0;text-transform:uppercase}
header h1 span{color:var(--pfaedle)}
header .thesis{color:var(--mut);font-size:12.5px;max-width:560px;line-height:1.35}
header .legend{margin-left:auto;display:flex;gap:14px;flex-wrap:wrap}
header .legend b{font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:500;color:var(--mut)}
.lgi{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;user-select:none}
.lgi i{width:16px;height:4px;border-radius:2px;display:inline-block}
.lgi.off{opacity:.32}
/* route rail */
#rail{background:var(--surf);border-right:1px solid var(--line);overflow-y:auto;padding:6px 0}
.grp{padding:11px 12px 4px;font:600 10px/1 Oswald;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
.blade{display:flex;align-items:center;gap:8px;margin:2px 7px;padding:6px 8px;border-radius:7px;
  cursor:pointer;border:1px solid transparent}
.blade:hover{background:var(--surf2)}
.blade.sel{background:var(--surf2);border-color:var(--line2)}
.blade .no{font-family:Oswald;font-weight:600;font-size:16px;letter-spacing:.5px;
  padding:2px 7px;border-radius:4px;color:#fff;min-width:44px;text-align:center;line-height:1.25}
.blade .no.kmb{background:var(--kmb)} .blade .no.ctb{background:var(--ctb);color:#1a1300}
.blade .meta{font-size:11px;color:var(--mut);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
/* map */
#mapwrap{position:relative}
#map{position:absolute;inset:0;background:#e9e7e2}
.leaflet-tile{filter:grayscale(1) contrast(.92) brightness(1.04) opacity(.5)}
#rtag{position:absolute;top:12px;left:12px;z-index:500;background:rgba(13,16,19,.86);
  backdrop-filter:blur(7px);border:1px solid var(--line2);border-radius:10px;padding:9px 13px;max-width:60%}
#rtag .rn{font-family:Oswald;font-weight:600;font-size:26px;letter-spacing:.5px;line-height:1}
#rtag .od{color:var(--mut);font-size:12px;margin-top:3px}
.ctag{display:inline-block;font:600 10px/1 Oswald;letter-spacing:.8px;text-transform:uppercase;
  padding:3px 7px;border-radius:5px;margin-top:7px;border:1px solid}
/* panel */
#panel{background:var(--surf);border-left:1px solid var(--line);overflow-y:auto}
.psec{padding:13px 15px;border-bottom:1px solid var(--line)}
.psec h2{font:600 11px/1 Oswald;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin:0 0 10px}
.gist{padding:13px 15px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(50,215,75,.09),rgba(50,215,75,.02))}
.gist .gh{font:600 11px/1 Oswald;letter-spacing:1.5px;text-transform:uppercase;color:var(--pfaedle);margin-bottom:7px}
.gist p{margin:0;font-size:12.5px;line-height:1.55;color:var(--tx)}
.gist .amp{color:var(--chord);font-weight:600;font-style:italic}
.gist .pf{color:var(--pfaedle)}
/* candidate cards */
.cand{border:1px solid var(--line);border-radius:9px;padding:10px 11px;margin-bottom:9px;cursor:pointer;
  background:var(--surf);transition:border-color .12s}
.cand:hover{border-color:var(--line2)} .cand.focus{border-color:var(--line2);background:var(--surf2)}
.cand.hidden{opacity:.5}
.cand .top{display:flex;align-items:center;gap:8px}
.cand .dot{width:11px;height:11px;border-radius:3px;flex:none}
.cand .nm{font-weight:600;font-size:13px}
.cand .eye{margin-left:auto;font-size:11px;color:var(--dim)}
.cand .sub{font-size:11px;color:var(--mut);margin:5px 0 7px}
.bar{height:6px;border-radius:3px;background:var(--surf2);overflow:hidden;margin:6px 0 4px}
.bar i{display:block;height:100%;border-radius:3px}
.cand .row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--mut);margin-top:3px}
.cand .row b{color:var(--tx)}
.pill{font:500 10px/1.4 "IBM Plex Mono";padding:2px 6px;border-radius:4px;border:1px solid var(--line2);color:var(--mut)}
.verdict{font-size:11.5px;padding:6px 8px;border-radius:6px;margin-top:7px;line-height:1.4}
.v-good{background:rgba(50,215,75,.1);color:#7ee89a} .v-warn{background:rgba(255,159,10,.1);color:#ffc061}
.v-bad{background:rgba(255,69,58,.1);color:#ff8a82} .v-none{background:var(--surf2);color:var(--mut)}
/* pseudocode */
pre.pc{background:#0a0d10;border:1px solid var(--line);border-radius:8px;padding:11px 12px;margin:0;
  font:12px/1.55 "IBM Plex Mono";color:#c6cfda;white-space:pre-wrap;overflow-x:auto}
pre.pc .kw{color:#c07cf0} pre.pc .cm{color:#5c6675} pre.pc .st{color:var(--pfaedle)}
.orc{width:100%;border-radius:8px;border:1px solid var(--line);display:block}
.orc-ph{padding:22px 12px;text-align:center;color:var(--dim);font-size:12px;border:1px dashed var(--line2);border-radius:8px}
.upl{display:block;text-align:center;font-size:12px;font-weight:500;color:#00c8ff;cursor:pointer;
  padding:8px 10px;border:1px dashed #00c8ff55;border-radius:8px;background:rgba(0,200,255,.06);transition:background .12s}
.upl:hover{background:rgba(0,200,255,.13)}
a{color:#5eb1ff}
.foot{padding:11px 15px;color:var(--dim);font-size:11px;line-height:1.5}
@media (max-width:900px){#app{grid-template-columns:1fr;grid-template-rows:auto 40vh auto auto}
  #rail{display:flex;overflow-x:auto;grid-row:auto} .grp{display:none} #panel{border-left:none;border-top:1px solid var(--line)}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style></head><body>
<div id=app>
<header>
  <h1>Route-geometry repair <span>console</span></h1>
  <div class=thesis>The government waypoint source draws stray loops &amp; detours. Two repairs disagree — a minimal client guard vs. re-deriving from OpenStreetMap — and the length numbers alone lie. Pick a route; see what each does to the line.</div>
  <div class=legend>
    <div class="lgi" data-c=csdi><i style="background:var(--csdi)"></i>CSDI (raw)</div>
    <div class="lgi" data-c=chord><i style="background:var(--chord)"></i>#272 chord</div>
    <div class="lgi" data-c=pfaedle><i style="background:var(--pfaedle)"></i>pfaedle</div>
    <div class="lgi" data-c=oracle><i style="background:#00c8ff"></i>oracle</div>
    <div class="lgi" data-c=stops><i style="background:var(--stop)"></i>stops</div>
  </div>
</header>
<nav id=rail></nav>
<div id=mapwrap><div id=map></div><div id=rtag></div></div>
<aside id=panel></aside>
</div>
<script>
const C={csdi:'#ff453a',chord:'#ff9f0a',deloop:'#c07cf0',pfaedle:'#32d74b'};
const NAME={csdi:'CSDI — raw source',chord:'#272 · tail chord',deloop:'#80 · self-overlap heal',pfaedle:'pfaedle · OSM map-match'};
const LIVES={csdi:'—',chord:'client hook',deloop:'client hook',pfaedle:'crawler pipeline'};
const LOC={csdi:'0',chord:'~30 lines',deloop:'~60 lines',pfaedle:'0 app-side'};
const FIXES={csdi:'nothing (baseline)',chord:'terminal loops only',deloop:'terminal + some mid-route',pfaedle:'all classes (re-derives)'};
const PC={
 chord:`<span class=cm># PR #272 — collapse a doubling-back TAIL to a chord</span>
walk parts from the <span class=kw>last</span> one backwards:
  <span class=kw>if</span> part doubles back (long, far excursion,
       beyond its two endpoints):
     part ← straight line [start → end]
  <span class=kw>else</span>: stop            <span class=cm># leave every earlier part alone</span>`,
 deloop:`<span class=cm># PR #80 — heal EVERY spurious part, prove it first</span>
<span class=kw>for</span> each part:
  <span class=kw>if</span> part doubles back:
     healed ← de-loop(part)   <span class=cm># excise out-and-back spurs</span>
     <span class=kw>if</span> healed collapsed ≥20%:   <span class=cm># it WAS a real loop</span>
        part ← healed (chord if still spurious)
     <span class=cm># else: low self-overlap = a real road → keep it</span>`,
 pfaedle:`<span class=cm># pfaedle — ignore the broken line entirely</span>
take the <span class=st>stop sequence</span> (not the CSDI shape)
snap each stop onto the <span class=st>OpenStreetMap</span> road graph
route stop→stop along real roads
   (hidden-markov map-match, shortest legal path)
<span class=cm># fixes any class — but replaces GOOD geometry too</span>`};
let R=[], ORC={}, cur=0, focus='pfaedle';
const vis={csdi:1,chord:0,pfaedle:1,oracle:1,stops:0};
let orcOpacity=0.9;
// focusing a candidate auto-selects the layers that best tell its story
// (the candidate itself + the raw CSDI baseline + the official-line arbiter)
const AUTO={
  csdi:    {csdi:1,chord:0,pfaedle:0,oracle:1,stops:0},
  chord:   {csdi:1,chord:1,pfaedle:0,oracle:1,stops:0},
  pfaedle: {csdi:1,chord:0,pfaedle:1,oracle:1,stops:0},
};
function autoLayers(k){const a=AUTO[k]||AUTO.pfaedle;for(const key in a)vis[key]=a[key];}
function syncLegend(){for(const el of document.querySelectorAll('.lgi'))el.classList.toggle('off',!vis[el.dataset.c]);}
let map, layers={};
const km=m=>(m/1000).toFixed(1)+' km';
const ll=c=>c.map(p=>[p[1],p[0]]);

fetch('console_routes.json').then(r=>r.json()).then(d=>{R=d;init();
  // optional auto-load of a co-located oracle file: present on the private/intranet build,
  // absent on public GitHub Pages — there the official lines are loaded via the upload control.
  fetch('hkbus-oracle.geojson').then(r=>r.ok?r.json():null).then(g=>{if(g)loadOracle(g);}).catch(()=>{});
});
// Ingest an hkbus-oracle GeoJSON FeatureCollection -> ORC keyed by properties.tag.
function loadOracle(gj){
  const feats=(gj&&gj.features)||[]; ORC={};
  for(const f of feats){const p=f.properties||{};const t=p.tag;
    if(t&&f.geometry&&f.geometry.type==='LineString')
      ORC[t]={coords:f.geometry.coordinates,op:p.op,variant:p.variant,source:p.source};}
  if(map) draw();
}

function init(){
  map=L.map('map',{preferCanvas:true,zoomControl:false});
  map.createPane('oraclePane'); map.getPane('oraclePane').style.zIndex=650;
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,
    attribution:'© OpenStreetMap'}).addTo(map);
  // route rail grouped by class
  const GRP=[['terminal','Terminal loops'],['detour','Detour'],['mid-loop','Mid-route loops'],
             ['borderline','Borderline'],['benign','Benign (controls)'],['wrong-hwy','Wrong-highway']];
  const rail=document.getElementById('rail');
  for(const [k,label] of GRP){
    const rs=R.map((r,i)=>[r,i]).filter(([r])=>r.klass===k);
    if(!rs.length) continue;
    const h=document.createElement('div'); h.className='grp'; h.textContent=label; rail.appendChild(h);
    for(const [r,i] of rs){
      const b=document.createElement('div'); b.className='blade'; b.dataset.i=i;
      b.innerHTML=`<span class="no ${r.co==='ctb'?'ctb':'kmb'}">${r.route}</span>`+
                  `<span class=meta>${r.dest}</span>`;
      b.onclick=()=>{cur=i;draw()}; rail.appendChild(b);
    }
  }
  for(const el of document.querySelectorAll('.lgi')) el.onclick=()=>{
    const c=el.dataset.c==='stops'?'stops':el.dataset.c; vis[c]^=1;
    el.classList.toggle('off',!vis[c]); paint();
  };
  draw();
}
function draw(){
  document.querySelectorAll('.blade').forEach(b=>b.classList.toggle('sel',+b.dataset.i===cur));
  paint(true); panel(); syncLegend();
}
function paint(fit){
  for(const k in layers) map.removeLayer(layers[k]); layers={};
  const r=R[cur];
  const orc=ORC[r.tag];
  const order=['csdi','chord','pfaedle'];
  for(const k of order){
    if(!vis[k]) continue; const c=r.curves[k]; if(!c||!c.length) continue;
    const foc=k===focus;
    layers[k]=L.polyline(ll(c),{color:C[k],weight:foc?5:3,opacity:foc?1:.62,
      dashArray:k==='csdi'?null:null}).addTo(map);
  }
  // oracle native vector line (official KMB/CTB) — floats ON TOP as the arbiter
  if(vis.oracle && orc && orc.coords){
    const oll=ll(orc.coords);
    layers.oracle=L.layerGroup([
      L.polyline(oll,{color:'#04121a',weight:7,opacity:orcOpacity*0.8,pane:'oraclePane',interactive:false}),
      L.polyline(oll,{color:'#00c8ff',weight:3.5,opacity:orcOpacity,pane:'oraclePane',interactive:false}),
    ]).addTo(map);
  }
  if(vis.stops) layers.stops=L.layerGroup(r.stops.map(p=>L.circleMarker([p[1],p[0]],
    {radius:3,color:'#8a6d00',weight:1,fillColor:C.stop='#ffd60a',fillOpacity:.95}))).addTo(map);
  if(fit){const g=L.featureGroup(Object.values(layers).filter(l=>l.getBounds&&l.getBounds().isValid()));
    if(g.getLayers().length) map.fitBounds(g.getBounds().pad(.09));}
}
function verdict(r,k){
  const d=r.lens[k]-r.lens.csdi, pct=Math.round(Math.abs(d)/r.lens.csdi*100);
  if(k==='csdi') return['v-none','the raw line, drawn as-is'];
  if(!r.touched[k]) {
    if(r.klass==='benign') return['v-good','correctly left this good route untouched'];
    return['v-none','no change on this route'];
  }
  if(r.klass==='benign') return['v-bad',`altered a GOOD route by ${pct}% — false positive`];
  if(d<0) return['v-good',`shortened ${pct}% — loop/detour removed`];
  return['v-warn',`grew ${pct}% longer — inspect against the oracle`];
}
function panel(){
  const r=R[cur];
  const CT={terminal:['var(--csdi)','Terminal loop'],detour:['var(--deloop)','Circuit detour'],
    'mid-loop':['var(--chord)','Mid-route loop'],borderline:['var(--mut)','Borderline'],
    benign:['var(--pfaedle)','Benign — control'],'wrong-hwy':['#ff6b9d','Wrong-highway']};
  const [cc,cl]=CT[r.klass];
  document.getElementById('rtag').innerHTML=
    `<div class=rn style="color:${r.co==='ctb'?'var(--ctb)':'#ff5a63'}">${r.route}</div>`+
    `<div class=od>${r.orig} → ${r.dest}</div>`+
    `<div class=ctag style="color:${cc};border-color:${cc}">${cl}</div>`;
  const maxlen=Math.max(...['csdi','chord','pfaedle'].map(k=>r.lens[k]));
  let cards='';
  for(const k of ['csdi','chord','pfaedle']){
    const c=r.curves[k]; const has=c&&c.length; const [vc,vt]=verdict(r,k);
    const w=Math.round(r.lens[k]/maxlen*100);
    cards+=`<div class="cand ${k===focus?'focus':''} ${vis[k]?'':'hidden'}" data-k="${k}">
      <div class=top><span class=dot style="background:${C[k]}"></span>
        <span class=nm>${NAME[k]}</span>
        <span class=eye>${vis[k]?'●':'○'}</span></div>
      <div class=sub>${FIXES[k]}</div>
      <div class=bar><i style="width:${w}%;background:${C[k]}"></i></div>
      <div class=row><span>length</span><b class=mono>${has?km(r.lens[k]):'—'}</b></div>
      <div class=row><span>lives in</span><span class=pill>${LIVES[k]}</span></div>
      <div class=row><span>cost</span><span class=pill>${LOC[k]}</span></div>
      <div class="verdict ${vc}">${vt}</div></div>`;
  }
  document.getElementById('panel').innerHTML=`
    <div class=gist>
      <div class=gh>The gist</div>
      <p><b>#272</b> <span class=amp>amputates</span> CSDI's bad limbs — cheap and safe, but rough, and it
      only reaches the <b>termini</b>. <span class=amp>Repairing</span> CSDI is a dead end: you can't chord
      your way onto a road the data never drove — <b>route 15</b> never walks the right one.
      <b class=pf>pfaedle</b> re-derives every shape from OpenStreetMap, matches the official line across
      <b>all</b> classes, and map-matches the <b>whole fleet in ~40&nbsp;s</b>. So: pfaedle all the way.</p>
    </div>
    <div class=psec><h2>Candidate repairs — click to focus</h2>${cards}</div>
    <div class=psec><h2>How “${NAME[focus].split('·')[0].trim()}” works</h2>
      <pre class=pc>${PC[focus]||'<span class=cm># the raw government waypoints, unmodified</span>'}</pre></div>
    <div class=psec><h2>Ground truth — official ${r.co==='ctb'?'CTB':'KMB'} line</h2>
      <div id=orcbox></div></div>
    <div class=foot>Repairs run 1:1 from the real PRs. Lengths are geometry only; the official line
      (cyan) is the arbiter — a shorter line isn't automatically a correct one. The official lines are
      not bundled in this page; they load from a separate file, entirely in your browser.</div>`;
  for(const el of document.querySelectorAll('.cand')){
    el.onclick=e=>{const k=el.dataset.k;
      if(e.target.classList.contains('eye')){vis[k]^=1;paint();panel();syncLegend();return;}
      focus=k;autoLayers(k);draw();};
    const eye=el.querySelector('.eye'); eye.onclick=e=>{e.stopPropagation();
      const k=el.dataset.k;vis[k]^=1;paint();panel();};
  }
  // oracle control: native official line loaded from a client-side file (never uploaded)
  const ob=document.getElementById('orcbox');
  const nLoaded=Object.keys(ORC).length, here=ORC[r.tag];
  ob.innerHTML=`
    <div style="font-size:12px;color:var(--mut);margin-bottom:9px;line-height:1.45">${
      nLoaded
      ? `<b style="color:#00c8ff">${nLoaded}</b> official lines loaded${here?'':' — <span style="color:var(--warn)">none for this route</span>'}. Shown in cyan on top; fade to compare against any repair.`
      : `No oracle loaded. The official KMB/CTB lines ship as a <b>separate private file</b> — load it to overlay them. The file stays in your browser; it is never uploaded.`}</div>
    ${nLoaded?`<label style="font-size:11px;color:var(--dim)">overlay opacity</label>
      <input id=orcop type=range min=0 max=100 value="${Math.round(orcOpacity*100)}" style="width:100%;accent-color:#00c8ff;margin:2px 0 10px">`:''}
    <label class=upl>${nLoaded?'Load a different oracle file':'Load oracle file (.geojson)'}
      <input id=orcfile type=file accept=".geojson,.json,application/geo+json,application/json" hidden></label>
    ${here?`<div style="font-size:11px;color:var(--dim);margin-top:8px">this route · ${here.op} · ${here.variant||''}</div>`:''}
    <div id=orcerr style="font-size:11px;color:var(--bad);margin-top:6px"></div>`;
  if(nLoaded) document.getElementById('orcop').oninput=e=>{orcOpacity=e.target.value/100;paint();};
  document.getElementById('orcfile').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ const gj=JSON.parse(rd.result);
        if(!gj.features) throw new Error('not a FeatureCollection');
        loadOracle(gj);
      }catch(err){ document.getElementById('orcerr').textContent='Could not read oracle file: '+err.message; } };
    rd.readAsText(f);
  };
}
</script></body></html>
